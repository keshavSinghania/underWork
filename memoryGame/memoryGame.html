<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Same Card</title>
    <link href="memoryGame.css" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="navDiv">
            <div class="logoDiv"><p>Keshav <span>Singhania</span></p></div>
            <div class="linksDiv">
                <ul>
                    <li><a href="">Youtube</a></li>
                    <li><a href="">LinkedIn</a></li>
                    <li><a href="">Instagram</a></li>
                    <li><a href="">Github</a></li>
                    <li onclick= "changeTheme()">Theme </li>
                </ul>
            </div>
        </div>
    </nav>
    <main>
        <div class="scoresDiv">
            <div class="gameName"><h2>Guess The <span>Same Card</span></h2></div>
            <div class="scores">
                <div class="guess">Guessed: <span class="valueGuess">0</span></div>

            </div>
        </div>
        <div class="gameDiv">
            <ul class="myCards">

            </ul>
            <div class="won">
                <div class="wonImg">
                    <img src="won.gif" alt="">
                </div>
                <div class="wonMssg">
                    <h2>Meow Meow <span>You Did It</span> Meow Meow</h2>
                </div>
                <div class="restart">
                    <button onclick="refresh()">Restart Game</button>
                </div>
                
                
            </div>
        </div>
    </main>
    <script src="memoryGame.js"></script>
</body>
</html>
